<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingua - Kelime Öğrenme</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="app-container">
        <!-- Form Section -->
        <aside class="form-section glass">
            <div class="form-header">
                <h2>Yeni Kelime Ekle</h2>
            </div>
            <form id="wordForm">
                <div class="input-group">
                    <label for="english">İngilizce Kelime</label>
                    <input type="text" id="english" placeholder="Örn: Serendipity" required>
                </div>
                <div class="input-group">
                    <label for="translation">Türkçe Çeviri</label>
                    <input type="text" id="translation" placeholder="Örn: Tesadüfen bulunan mutluluk" required>
                </div>
                <div class="input-group">
                    <label for="example">Örnek Cümle</label>
                    <textarea id="example" placeholder="Finding this beautiful café was pure serendipity."
                        required></textarea>
                </div>
                <div class="form-actions" style="display: flex; gap: 0.5rem;">
                    <button type="submit" class="btn-primary" id="submitBtn">
                        <i class="fas fa-plus"></i> Kelimeyi Kaydet
                    </button>
                    <button type="button" class="btn-secondary" id="cancelEditBtn" style="display: none;"
                        onclick="cancelEdit()">
                        İptal
                    </button>
                </div>
            </form>
        </aside>

        <!-- Words List Section -->
        <main class="words-section">
            <div id="mainContent">
                <div class="words-header">
                    <h1>Kelimelerim</h1>
                    <div class="header-right" style="display: flex; gap: 1rem; align-items: center;">
                        <div class="stats-group">
                            <span class="stat-badge" title="Toplam Kelime"><i class="fas fa-layer-group"></i> <span
                                    id="totalCount">0</span></span>
                            <span class="stat-badge review" title="Tekrar Bekleyen"><i class="fas fa-clock"></i> <span
                                    id="reviewCount">0</span></span>
                        </div>
                        <button id="toggleQuizBtn" class="btn-primary"
                            style="width: auto; padding: 0.5rem 1rem; border-radius: 12px; font-size: 0.9rem;">
                            <i class="fas fa-gamepad"></i> Quiz
                        </button>
                    </div>
                </div>

                <div class="words-controls glass">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Kelime veya çeviri ara...">
                    </div>
                    <div class="filter-group">
                        <button class="filter-btn active" data-filter="all">Tümü</button>
                        <button class="filter-btn" data-filter="review">Tekrar Edilecekler</button>
                    </div>
                </div>

                <div id="wordsGrid" class="words-grid">
                    <!-- Words will be dynamically loaded here -->
                </div>
            </div>

            <!-- Quiz Section (Hidden by default) -->
            <div id="quizSection" class="quiz-section glass"
                style="display: none; text-align: center; padding: 3rem; flex-direction: column; align-items: center; justify-content: center; min-height: 400px;">
                <div id="quizContent" style="width: 100%; max-width: 600px;">
                    <h2 style="font-size: 2rem; margin-bottom: 2rem; color: #fff;">Tekrar Vakti! <span id="quizProgress"
                            style="font-size: 1rem; opacity: 0.7; margin-left: 1rem;"></span></h2>

                    <div id="quizCard" class="quiz-card"
                        style="background: rgba(255,255,255,0.1); padding: 3rem; border-radius: 20px; margin-bottom: 2rem; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: all 0.3s ease;">
                        <h3 id="quizEnglish"
                            style="font-size: 3rem; margin-bottom: 1rem; color: #fff; text-transform: capitalize;">Word
                        </h3>
                        <div id="quizHiddenPart" style="display: none;">
                            <p id="quizTranslation"
                                style="font-size: 1.5rem; color: #fecfef; font-weight: 600; margin-bottom: 1rem;">
                                Translation</p>
                            <p id="quizExample"
                                style="font-size: 1.1rem; color: #fff; font-style: italic; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px;">
                                Example</p>
                        </div>
                        <p id="quizHint" style="font-size: 0.9rem; margin-top: 2rem; color: rgba(255,255,255,0.6);"><i
                                class="fas fa-hand-pointer"></i> Çeviriyi görmek için tıkla</p>
                    </div>

                    <div id="quizActions" style="display: none; gap: 1rem; justify-content: center;">
                        <button class="btn-secondary" onclick="handleQuizAnswer(false)"
                            style="background: rgba(255, 71, 87, 0.2); border-color: rgba(255,71,87,0.5); color: #fff;">
                            <i class="fas fa-times"></i> Bilemedim
                        </button>
                        <button class="btn-primary" onclick="handleQuizAnswer(true)"
                            style="background: rgba(46, 213, 115, 0.2); border-color: rgba(46,213,115,0.5); color: #fff; box-shadow: none;">
                            <i class="fas fa-check"></i> Bildim
                        </button>
                    </div>
                </div>

                <div id="quizEmpty" style="display: none;">
                    <i class="fas fa-check-circle" style="font-size: 4rem; color: #2ecc71; margin-bottom: 1rem;"></i>
                    <h2 style="color: #fff;">Harika!</h2>
                    <p style="color: rgba(255,255,255,0.8); margin-bottom: 2rem;">Şu an tekrar edilecek kelimeniz yok.
                    </p>
                </div>

                <button id="exitQuizBtn" class="btn-secondary"
                    style="margin-top: 2rem; width: auto; padding: 0.8rem 2rem;">
                    <i class="fas fa-arrow-left"></i> Quizden Çık
                </button>
            </div>

        </main>
    </div>

    <!-- Toast Container for Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Custom Modal for Deletion -->
    <div id="deleteModal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass">
            <div class="modal-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3>Kelimeyi Sil</h3>
            <p>Bu kelimeyi kalıcı olarak silmek istediğinize emin misiniz? Bu işlem geri alınamaz.</p>
            <div class="modal-actions">
                <button id="cancelDeleteBtn" class="btn-secondary">İptal</button>
                <button id="confirmDeleteBtn" class="btn-primary"
                    style="background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); color: #fff; box-shadow: none; border: none;">Evet,
                    Sil</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
