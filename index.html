<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingua – Kelime Öğrenme</title>
    <meta name="description" content="İngilizce kelime öğrenme uygulaması">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-language" style="color:#fff;"></i></div>
            <div>
                <div class="logo-text">Lingua</div>
                <div class="logo-sub">Kelime Öğrenme</div>
            </div>
        </div>

        <form id="wordForm">
            <div class="form-title" id="formTitle">Yeni Kelime Ekle</div>

            <div class="form-fields" style="margin-top: 16px;">
                <div class="field">
                    <label for="english">İngilizce Kelime</label>
                    <input type="text" id="english" placeholder="Örn: Serendipity" required>
                </div>

                <div class="field">
                    <label for="translation">Türkçe Çeviri</label>
                    <input type="text" id="translation" placeholder="Örn: Tesadüfen bulunan mutluluk" required>
                </div>

                <div class="field">
                    <label for="example">İngilizce Örnek Cümle</label>
                    <textarea id="example" placeholder="Finding this café was pure serendipity." required></textarea>
                </div>

                <div class="field">
                    <label for="exampleTurkish">
                        Türkçe Cümle
                        <span class="optional-label">isteğe bağlı</span>
                    </label>
                    <textarea id="exampleTurkish" placeholder="Bu kafeyi bulmak tam bir tesadüftü."></textarea>
                </div>
            </div>

            <div class="form-btns" style="margin-top: 16px;">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="fas fa-plus"></i> Kelimeyi Kaydet
                </button>
                <button type="button" class="btn btn-ghost" id="cancelEditBtn" style="display:none;" onclick="cancelEdit()">
                    <i class="fas fa-times"></i> İptal
                </button>
            </div>
        </form>
    </aside>

    <!-- ── MAIN ── -->
    <div class="main">
        <!-- Top bar -->
        <div class="topbar">
            <div class="topbar-left">
                <span class="page-title">Kelimelerim</span>
                <div class="stat-pills">
                    <span class="pill">
                        <i class="fas fa-layer-group"></i>
                        <span id="totalCount">0</span> kelime
                    </span>
                    <span class="pill danger">
                        <i class="fas fa-fire"></i>
                        <span id="reviewCount">0</span> tekrar
                    </span>
                </div>
            </div>
            <button id="toggleQuizBtn" class="btn-quiz">
                <i class="fas fa-gamepad"></i> Quiz
            </button>
        </div>

        <!-- Main content -->
        <div id="mainContent" style="display: flex; flex-direction: column; flex: 1;">
            <!-- Search & filter -->
            <div class="controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Kelime veya çeviri ara...">
                </div>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">Tümü</button>
                    <button class="filter-btn" data-filter="review">
                        <i class="fas fa-fire"></i> Tekrar
                    </button>
                </div>
            </div>

            <!-- Words grid -->
            <div class="content">
                <div id="wordsGrid" class="words-grid"></div>
            </div>
        </div>

        <!-- Quiz panel -->
        <div id="quizSection" class="quiz-panel" style="display:none;">
            <div id="quizContent" class="quiz-inner">
                <div class="quiz-top">
                    <h2>Quiz Modu</h2>
                    <span id="quizProgress" class="quiz-prog"></span>
                </div>

                <div id="quizCard" class="quiz-card">
                    <span class="quiz-label">Kelime</span>
                    <h3 id="quizEnglish" class="quiz-word">—</h3>
                    <div id="quizHiddenPart" style="display:none; flex-direction:column; align-items:center; gap:10px; width:100%;">
                        <p id="quizTranslation" class="quiz-translation"></p>
                        <p id="quizExample" class="quiz-example"></p>
                    </div>
                    <p id="quizHint" class="quiz-hint">
                        <i class="fas fa-hand-pointer"></i> Çeviriyi görmek için tıkla
                    </p>
                </div>

                <div id="quizActions" class="quiz-actions" style="display:none;">
                    <button class="quiz-btn wrong" onclick="handleQuizAnswer(false)">
                        <i class="fas fa-times"></i> Bilemedim
                    </button>
                    <button class="quiz-btn right" onclick="handleQuizAnswer(true)">
                        <i class="fas fa-check"></i> Bildim
                    </button>
                </div>
            </div>

            <div id="quizEmpty" class="quiz-empty" style="display:none;">
                <i class="fas fa-trophy"></i>
                <h2>Tebrikler!</h2>
                <p>Tekrar edilecek kelime kalmadı.</p>
            </div>

            <button id="exitQuizBtn" class="btn-exit">
                <i class="fas fa-arrow-left"></i> Listeye Dön
            </button>
        </div>
    </div>
</div>

<!-- Toast container -->
<div id="toastContainer" class="toast-container"></div>

<!-- Delete modal -->
<div id="deleteModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <div class="modal-icon"><i class="fas fa-trash-alt"></i></div>
        <h3>Kelimeyi Sil</h3>
        <p>Bu kelimeyi kalıcı olarak silmek istediğinize emin misiniz?</p>
        <div class="modal-btns">
            <button id="cancelDeleteBtn" class="btn-cancel-modal">İptal</button>
            <button id="confirmDeleteBtn" class="btn-confirm-delete">Evet, Sil</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
